name: business_calendar
description: A new Flutter project for Business Calendar.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.5
  shared_preferences: ^2.5.5
  mask_text_input_formatter: ^2.9.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  flutter_quill: ^11.5.0
  file_picker: ^8.1.3
  google_sign_in: 6.2.1
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo.png
    - assets/onboard1.png
    - assets/onboard2.png
    - assets/onboard3.png
    - assets/call.png
    - assets/sms-tracking.png
    - assets/menu/
    - assets/edit.png
    - assets/trash.png
    - assets/Preset.png
